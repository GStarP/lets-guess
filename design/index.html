<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lets Guess Prototype</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Outfit for a modern, geometric look -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
            },
            boxShadow: {
              soft: "0 10px 40px -10px rgba(79, 70, 229, 0.15)",
            },
          },
        },
      };
    </script>
    <style>
      /* Custom scrollbar for textareas */
      textarea::-webkit-scrollbar {
        width: 8px;
      }
      textarea::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      textarea::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      textarea::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      .fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .view-hidden {
        display: none !important;
      }

      /* Ensure main container handles viewport correctly */
      body {
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body
    class="bg-gray-100 text-slate-800 antialiased h-[100dvh] font-sans selection:bg-indigo-100 selection:text-indigo-700 overflow-hidden"
  >
    <!-- Mobile Container -->
    <main
      id="app-container"
      class="max-w-md mx-auto bg-gray-50 h-full relative shadow-2xl flex flex-col overflow-hidden"
    >
      <!-- ==================== VIEW 1: SETUP ==================== -->
      <section
        id="view-setup"
        class="flex flex-col h-full w-full absolute inset-0 bg-gray-50 fade-in z-10"
      >
        <!-- Header -->
        <header
          class="bg-white/80 backdrop-blur-md sticky top-0 z-20 border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0"
        >
          <h1 class="text-xl font-bold tracking-tight text-slate-900">
            Let's Guess
          </h1>
          <button
            onclick="app.handlers.onMoreClick()"
            class="p-2 -mr-2 text-slate-400 hover:text-indigo-600 transition-colors rounded-full hover:bg-slate-50"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="1"></circle>
              <circle cx="19" cy="12" r="1"></circle>
              <circle cx="5" cy="12" r="1"></circle>
            </svg>
          </button>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
          <!-- Upload Area (Compact) -->
          <div
            onclick="app.handlers.onMockUpload()"
            class="group cursor-pointer border-2 border-dashed border-indigo-200 hover:border-indigo-500 bg-indigo-50/50 hover:bg-indigo-50 rounded-xl p-3 flex items-center justify-center gap-2 transition-all duration-300 ease-out"
          >
            <div
              class="w-8 h-8 bg-white rounded-full shadow-sm flex items-center justify-center text-indigo-500 group-hover:scale-110 transition-transform"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </div>
            <span class="font-medium text-sm text-indigo-900">Upload</span>
          </div>

          <!-- Items List (Grid) -->
          <div id="setup-list" class="grid grid-cols-2 gap-3">
            <!-- Items will be injected here -->
            <div
              class="col-span-full text-center py-10 text-slate-400 text-sm italic empty-state-msg"
            >
              No items yet. Upload to start!
            </div>
          </div>
        </div>

        <!-- Fixed Bottom Action -->
        <div
          class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent z-20"
        >
          <button
            id="btn-start-game"
            onclick="app.handlers.onStartGame()"
            disabled
            class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-600/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2"
          >
            <span>Start</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>
      </section>

      <!-- ==================== VIEW 2: GAME ==================== -->
      <section
        id="view-game"
        class="flex flex-col h-full w-full absolute inset-0 bg-gray-50 view-hidden z-10"
      >
        <!-- Header -->
        <header
          class="bg-white/90 backdrop-blur-md z-10 px-4 py-3 flex justify-between items-center shadow-sm"
        >
          <button
            onclick="app.switchView('setup')"
            class="p-2 -ml-2 text-slate-500 hover:text-slate-800 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <div class="text-sm font-semibold text-slate-500 tracking-wider">
            <span id="game-progress-current">1</span> /
            <span id="game-progress-total">3</span>
          </div>
          <div class="w-8"></div>
          <!-- Spacer for balance -->
        </header>

        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto p-5 flex flex-col gap-6">
          <!-- Selected Names (Tags) - Centered & Simplified -->
          <div class="min-h-[3rem] flex items-center justify-center">
            <div
              id="game-selected-tags"
              class="flex flex-wrap gap-2 justify-center w-full"
            >
              <!-- Selected tags go here -->
              <span class="text-slate-400 text-sm px-2"
                >Select a name below...</span
              >
            </div>
          </div>

          <!-- Large Image with Floating Nav -->
          <div
            class="relative w-full aspect-square bg-slate-200 rounded-2xl overflow-hidden shadow-soft ring-1 ring-black/5 group"
          >
            <img
              id="game-main-image"
              src=""
              alt="Guess Item"
              class="w-full h-full object-cover transition-transform duration-700"
            />

            <!-- Prev Button -->
            <button
              id="btn-prev"
              onclick="app.handlers.onPrevSlide()"
              class="absolute top-1/2 left-2 -translate-y-1/2 z-10 p-3 rounded-full bg-white/50 backdrop-blur-md text-slate-800 hover:bg-white/80 transition-all disabled:opacity-0 disabled:pointer-events-none shadow-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>

            <!-- Next Button -->
            <button
              id="btn-next"
              onclick="app.handlers.onNextSlide()"
              class="absolute top-1/2 right-2 -translate-y-1/2 z-10 p-3 rounded-full bg-white/50 backdrop-blur-md text-slate-800 hover:bg-white/80 transition-all disabled:opacity-0 disabled:pointer-events-none shadow-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>

          <!-- Reason Input -->
          <div>
            <label
              class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block"
              >Reasoning</label
            >
            <textarea
              id="game-reason-input"
              oninput="app.handlers.onReasonInput(this.value)"
              rows="2"
              placeholder="Why did you pick this? (Optional)"
              class="w-full bg-white border border-slate-200 rounded-xl p-3 text-slate-700 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all resize-none"
            ></textarea>
          </div>

          <!-- Available Names Pool -->
          <div class="pb-10">
            <label
              class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block"
              >Available Names</label
            >
            <div id="game-name-pool" class="flex flex-wrap gap-2">
              <!-- Name chips go here -->
            </div>
          </div>
        </div>
      </section>

      <!-- ==================== VIEW 3: RESULT ==================== -->
      <section
        id="view-result"
        class="flex flex-col h-full w-full absolute inset-0 bg-slate-50 view-hidden z-10"
      >
        <!-- Header (Compact & Action Oriented) -->
        <div
          class="bg-white/90 backdrop-blur-md z-10 px-4 py-3 flex justify-between items-center shadow-sm"
        >
          <div class="relative w-full flex justify-between items-center">
            <!-- Left: Back Button (Play Again) -->
            <button
              onclick="app.switchView('setup')"
              class="p-2 -ml-2 text-slate-500 hover:text-slate-800 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>

            <!-- Center: Score -->
            <div class="flex flex-col items-center">
               <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Result</span>
               <div class="text-sm font-semibold text-slate-500 tracking-wider">
                  <span id="result-score">0</span> /
                  <span id="result-total">3</span>
               </div>
            </div>
            
            <!-- Right: Download -->
            <button
              onclick="app.handlers.onDownload()"
              class="p-2 -mr-2 text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 rounded-full transition-colors flex items-center gap-1"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
            </button>
          </div>
        </div>

        <!-- Scrollable Content -->
        <div
          class="flex-1 overflow-y-auto px-5 py-6 flex flex-col items-center"
        >
          <!-- Result Placeholder (Tall) -->
          <div
            class="h-[800px] w-full bg-white rounded-xl shadow-lg flex flex-col items-center justify-center text-slate-400 font-medium border border-slate-200"
          >
            <div
              class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-slate-300"
              >
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </div>
            <span>Full Result Image (Generated)</span>
            <span class="text-xs text-slate-300 mt-2"
              >Scroll to see more details...</span
            >
          </div>

          <!-- Spacer -->
          <div class="h-10"></div>
        </div>
      </section>
    </main>

    <!-- App Logic -->
    <script>
      // Helper to escape HTML special chars to prevent XSS and syntax errors
      const escapeHtml = (unsafe) => {
        if (typeof unsafe !== "string") return unsafe;
        return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      };

      const app = {
        state: {
          view: "setup", // setup, game, result
          items: [], // { id, name, image, userGuess, reason }
          currentIndex: 0,
        },

        init() {
          this.renderSetup();
          this.updateViewVisibility();
        },

        // --- State Management ---
        switchView(viewName) {
          this.state.view = viewName;
          this.updateViewVisibility();
          if (viewName === "game") this.renderGame();
          if (viewName === "result") this.renderResult();
          if (viewName === "setup") this.renderSetup();
        },

        updateViewVisibility() {
          ["setup", "game", "result"].forEach((v) => {
            const el = document.getElementById(`view-${v}`);
            if (v === this.state.view) {
              el.classList.remove("view-hidden");
              el.classList.add("fade-in");
            } else {
              el.classList.add("view-hidden");
              el.classList.remove("fade-in");
            }
          });
        },

        // --- Logic Helpers ---
        addItem(name = "", image = "https://placehold.co/400") {
          const id =
            Date.now().toString() + Math.random().toString(36).substr(2, 9);
          this.state.items.push({
            id,
            name,
            image,
            userGuess: null, // What user picked
            reason: "",
          });
          this.renderSetup();
        },

        removeItem(id) {
          this.state.items = this.state.items.filter((i) => i.id !== id);
          this.renderSetup();
        },

        updateItem(id, field, value) {
          const item = this.state.items.find((i) => i.id === id);
          if (item) item[field] = value;
          // Only re-render if it's not a text input to avoid focus loss, handled by DOM event usually
          // but for setup list input, we might need care.
          // For this prototype, we'll let the input event update state silently.
        },

        // --- Renders ---
        renderSetup() {
          const listEl = document.getElementById("setup-list");
          const btnStart = document.getElementById("btn-start-game");

          // Toggle Empty State
          if (this.state.items.length === 0) {
            listEl.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 text-sm italic empty-state-msg">No items yet. Upload to start!</div>`;
            btnStart.disabled = false; // Allow mock start
            btnStart.querySelector("span").textContent = "Start Demo Game";
            return;
          }

          if (this.state.items.length < 2) {
            btnStart.disabled = true;
            btnStart.querySelector("span").textContent = "Add 2+ items";
          } else {
            btnStart.disabled = false;
            btnStart.querySelector("span").textContent = "Start";
          }

          listEl.innerHTML = this.state.items
            .map(
              (item, index) => `
                    <div class="relative group bg-white p-2 rounded-xl shadow-sm border border-slate-100 flex flex-col gap-2">
                        <!-- Image -->
                        <div class="w-full aspect-square bg-slate-100 rounded-lg overflow-hidden relative">
                            <img src="${item.image}" class="w-full h-full object-cover">
                            
                            <!-- Delete Button (Overlay on Image) -->
                            <button onclick="app.removeItem('${item.id}')" class="absolute top-1 right-1 bg-white/90 backdrop-blur-sm text-slate-400 hover:text-red-500 p-2 rounded-full shadow-sm transition-all hover:scale-110">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                        
                        <!-- Input -->
                        <div class="w-full">
                            <input type="text" 
                                value="${escapeHtml(item.name)}" 
                                oninput="app.updateItem('${item.id}', 'name', this.value)"
                                placeholder="Name..." 
                                class="w-full bg-transparent text-slate-800 text-xs font-medium text-center placeholder:text-slate-300 outline-none border-none p-0 focus:ring-0">
                        </div>
                    </div>
                `,
            )
            .join("");
        },

        renderGame() {
          const item = this.state.items[this.state.currentIndex];
          if (!item) return;

          // Progress
          document.getElementById("game-progress-current").textContent =
            this.state.currentIndex + 1;
          document.getElementById("game-progress-total").textContent =
            this.state.items.length;

          // Image
          document.getElementById("game-main-image").src = item.image;

          // Input values
          document.getElementById("game-reason-input").value =
            item.reason || "";

          // Selected Tags
          const selectedContainer =
            document.getElementById("game-selected-tags");
          if (item.userGuess) {
            selectedContainer.innerHTML = `
                        <button onclick="app.handlers.onUnselectTag()" class="animate-[popIn_0.2s_ease-out] bg-indigo-600 text-white px-5 py-2 rounded-full text-base font-bold shadow-lg shadow-indigo-500/30 flex items-center gap-2 group hover:bg-indigo-700 transition-all">
                            ${escapeHtml(item.userGuess)}
                            <svg class="w-4 h-4 opacity-70 group-hover:opacity-100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    `;
          } else {
            selectedContainer.innerHTML = `<span class="text-slate-400 text-sm italic px-2">Select a name below...</span>`;
          }

          // Name Pool (All names available to pick)
          const poolContainer = document.getElementById("game-name-pool");
          const allNames = this.state.items
            .map((i) => i.name)
            .filter((n) => n)
            .sort();

          // Filter names already used by OTHER items
          const otherGuessedNames = this.state.items
            .filter((i) => i !== item && i.userGuess)
            .map((i) => i.userGuess);

          let poolHtml = allNames
            .map((name) => {
              // Hide if used by others or selected by current
              if (otherGuessedNames.includes(name)) return "";
              if (item.userGuess === name) return "";

              return `
                        <button onclick="app.handlers.onSelectTag('${escapeHtml(name)}')" class="bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-medium hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50 transition-all active:scale-95 shadow-sm">
                            ${escapeHtml(name)}
                        </button>
                    `;
            })
            .join("");

          // Finish Button Logic
          const allAnswered = this.state.items.every((i) => i.userGuess);
          if (allAnswered) {
            poolHtml += `
                        <button onclick="app.switchView('result')" class="w-full mt-6 bg-green-500 hover:bg-green-600 text-white text-lg font-bold py-4 rounded-xl shadow-xl shadow-green-500/20 transition-all active:scale-95 flex items-center justify-center gap-2 animate-[fadeIn_0.3s_ease-out]">
                            <span>Submit</span>
                        </button>
                     `;
          }

          poolContainer.innerHTML = poolHtml;

          // Nav Buttons
          document.getElementById("btn-prev").disabled =
            this.state.currentIndex === 0;

          const isLast =
            this.state.currentIndex === this.state.items.length - 1;
          document.getElementById("btn-next").disabled = isLast;
        },

        renderResult() {
          let correctCount = 0;
          // No result list to render anymore, just score calculation

          this.state.items.forEach((item) => {
            const isCorrect =
              item.userGuess &&
              item.userGuess.toLowerCase().trim() ===
                item.name.toLowerCase().trim();
            if (isCorrect) correctCount++;
          });

          document.getElementById("result-score").textContent = correctCount;
          document.getElementById("result-total").textContent =
            this.state.items.length;
        },

        // --- Handlers ---
        handlers: {
          onMockUpload() {
            const mockNames = ["Orange", "Pear", "Grape", "Mango"];
            const randomName =
              mockNames[Math.floor(Math.random() * mockNames.length)];
            // Use different color placeholders to distinguish
            const colors = [
              "ffadad",
              "ffd6a5",
              "fdffb6",
              "caffbf",
              "9bf6ff",
              "a0c4ff",
              "bdb2ff",
              "ffc6ff",
            ];
            const color = colors[Math.floor(Math.random() * colors.length)];
            app.addItem("", `https://placehold.co/400/${color}/fff?text=Image`);
          },

          onStartGame() {
            if (app.state.items.length === 0) {
              // Mock Data Pre-fill
              app.state.items = [
                {
                  id: "1",
                  name: "Apple",
                  image: "https://placehold.co/400/ff9999/fff?text=Apple",
                  userGuess: null,
                  reason: "",
                },
                {
                  id: "2",
                  name: "Banana",
                  image: "https://placehold.co/400/ffe680/555?text=Banana",
                  userGuess: null,
                  reason: "",
                },
                {
                  id: "3",
                  name: "Cherry",
                  image: "https://placehold.co/400/ff80bf/fff?text=Cherry",
                  userGuess: null,
                  reason: "",
                },
              ];
            }
            app.state.currentIndex = 0;
            app.switchView("game");
          },

          onMoreClick() {
            alert("Menu: Import, Export, Clear Data (Mock)");
          },

          onSelectTag(name) {
            const item = app.state.items[app.state.currentIndex];
            item.userGuess = name;
            app.renderGame();
          },

          onUnselectTag() {
            const item = app.state.items[app.state.currentIndex];
            item.userGuess = null;
            app.renderGame();
          },

          onReasonInput(val) {
            const item = app.state.items[app.state.currentIndex];
            item.reason = val;
          },

          onPrevSlide() {
            if (app.state.currentIndex > 0) {
              app.state.currentIndex--;
              app.renderGame();
            }
          },

          onNextSlide() {
            if (app.state.currentIndex < app.state.items.length - 1) {
              app.state.currentIndex++;
              app.renderGame();
            }
          },

          onDownload() {
            alert("Downloading results as PDF... (Mock)");
          },
        },
      };

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        app.init();
      });
    </script>
